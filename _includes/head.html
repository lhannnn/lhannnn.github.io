<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.url == "/" %}{{ page.title | default: site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/cv.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/project.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/publication.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/news.css' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans+TC:wght@100..900&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      corePlugins: {
        preflight: false
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/main/favicon.svg' | relative_url }}">
  <meta name="theme-color" content="#ffffff">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.url == '/' %}{{ page.title | default: site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | strip_newlines }}">
  <meta property="og:image" content="{% if page.image %}{{ page.image | relative_url }}{% elsif page.slug %}{{ '/assets/images/publication/' | append: page.slug | append: '.jpg' | relative_url }}{% else %}{{ '/assets/images/main/opengraph.jpg' | relative_url }}{% endif %}">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    window.addEventListener('load', function () {
      if (window.lucide) {
        lucide.createIcons();
      }
    });
  </script>

  {% if page.slug %}
  <meta name="citation_title" content="{{ page.title }}">
  {% for author in page.authors %}
  <meta name="citation_author" content="{{ author | split: ' ' | last }}, {{ author | split: ' ' | first }}">
  {% endfor %}
  <meta name="citation_publication_date" content="{{ page.year }}">
  {% if page.venue contains ',' %}
  <meta name="citation_journal_title" content="{{ page.venue | split: ', ' | first }}">
  {% else %}
  <meta name="citation_conference_title" content="{{ page.venue }}">
  {% endif %}
  {% unless page.pdf == false %}
  <meta name="citation_pdf_url" content="{{ site.url }}{% if page.pdf %}{{ page.pdf }}{% else %}{{ page.slug | prepend: '/assets/pdf/' | append: '.pdf' }}{% endif %}">
  {% endunless %}
  {% endif %}
</head>
